name: Publish docs

# Renders the Quarto site in site/ and deploys it to GitHub Pages via the
# Pages Actions pipeline (no gh-pages branch needed). Enable once with:
#   gh api -X POST repos/OWNER/REPO/pages -f build_type=workflow
# or Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - ".claude-plugin/marketplace.json"
      - "docs/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: gen_catalog.py derives each plugin's last-updated date
          # from git log; a shallow clone would render every date as "—".
          fetch-depth: 0

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Generate the catalog BEFORE render: Quarto expands {{< include >}} while
      # scanning inputs, which happens before the pre-render step runs.
      - name: Generate skill catalog
        run: python3 site/scripts/gen_catalog.py

      - name: Render site
        run: quarto render site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
