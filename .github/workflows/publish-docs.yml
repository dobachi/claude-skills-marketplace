name: Publish docs

# Renders the Quarto site in site/ and publishes it to the gh-pages branch.
# One-time setup after the first successful run: repo Settings → Pages →
# "Deploy from a branch" → branch `gh-pages` / root.

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - ".claude-plugin/marketplace.json"
      - "docs/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Python (for the catalog pre-render step)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
